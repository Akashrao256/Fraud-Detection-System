services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-frauddb}
      POSTGRES_USER: ${DB_USERNAME:-fraud_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fraud_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-fraud_user} -d ${POSTGRES_DB:-frauddb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fraud-detection-system
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/frauddb}
      DB_USERNAME: ${DB_USERNAME:-fraud_user}
      DB_PASSWORD: ${DB_PASSWORD:-fraud_password}
      APP_RESET_DATA: ${APP_RESET_DATA:-false}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres-data:
