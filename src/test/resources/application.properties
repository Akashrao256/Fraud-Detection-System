# Test database configuration
spring.datasource.url=jdbc:h2:mem:frauddb-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate test configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email configuration disabled for tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.test-connection=false

# Logging configuration
logging.level.com.frauddetection=DEBUG
logging.level.org.springframework.security=DEBUG

# Application-specific properties
app.security.jwt.secret=fraud-detection-system-demo-secret-key-2026
app.security.jwt.expiration=86400000
app.data.reset-on-startup=true
