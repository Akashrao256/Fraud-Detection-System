# Active Spring Profile (H2 for local development, postgres for deployment)
spring.profiles.active=h2

# Server configuration
server.port=8080

# JPA/Hibernate common configuration
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Email configuration disabled for testing
spring.mail.host=localhost
spring.mail.port=25
spring.mail.test-connection=false

# Logging configuration
logging.level.com.frauddetection=DEBUG
logging.level.org.springframework.security=DEBUG

# Application-specific properties
app.security.jwt.secret=fraud-detection-system-demo-secret-key-2026
app.security.jwt.expiration=86400000
app.data.reset-on-startup=${APP_RESET_DATA:false}
