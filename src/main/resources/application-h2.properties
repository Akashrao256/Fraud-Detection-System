# H2 Embedded Database Profile - Local Development and Testing
# Activated by: spring.profiles.active=h2 in application.properties

# Database configuration - H2 embedded
spring.datasource.url=jdbc:h2:mem:frauddetectiondb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console for database inspection (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Keep application running for development
spring.jpa.defer-datasource-initialization=true
